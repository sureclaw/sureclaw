# Test config for Apple Container sandbox
agent: pi-coding-agent
models:
  default:
    - openrouter/google/gemini-2.0-flash-001
profile: yolo
providers:
  memory: cortex
  security: patterns
  database: sqlite
  channels: []
  web:
    extract: none
    search: none
  browser: none
  credentials: plaintext
  audit: database
  sandbox: apple
  scheduler: none
  workspace: none
sandbox:
  timeout_sec: 120
  memory_mb: 512
scheduler:
  active_hours:
    start: "07:00"
    end: "23:00"
    timezone: America/New_York
  max_token_budget: 4096
  heartbeat_interval_min: 30
