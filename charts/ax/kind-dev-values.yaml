# Dev mode values for local kind cluster with host volume mounts.
# Code changes are picked up after: npm run build → flush pods.
# Usage: helm install ax charts/ax -f charts/ax/kind-dev-values.yaml
preset: "small"

namespace:
  create: false
  name: ax-dev

imageDefaults:
  registry: ""
  tag: latest
  pullPolicy: IfNotPresent

host:
  replicas: 1
  command: ["node", "--inspect=0.0.0.0:9229", "/opt/ax/dist/host/server-k8s.js"]
  env:
    - name: LOG_LEVEL
      value: "debug"
    - name: LOG_SYNC
      value: "1"
  extraVolumeMounts:
    - name: ax-dev-dist
      mountPath: /opt/ax/dist
    - name: ax-dev-templates
      mountPath: /opt/ax/templates
    - name: ax-dev-skills
      mountPath: /opt/ax/skills
  extraVolumes:
    - name: ax-dev-dist
      hostPath:
        path: /ax-dev/dist
    - name: ax-dev-templates
      hostPath:
        path: /ax-dev/templates
    - name: ax-dev-skills
      hostPath:
        path: /ax-dev/skills

poolController:
  replicas: 1
  command: ["node", "/opt/ax/dist/pool-controller/main.js"]
  reconcileIntervalMs: 3000
  extraVolumeMounts:
    - name: ax-dev-dist
      mountPath: /opt/ax/dist
    - name: ax-dev-templates
      mountPath: /opt/ax/templates
  extraVolumes:
    - name: ax-dev-dist
      hostPath:
        path: /ax-dev/dist
    - name: ax-dev-templates
      hostPath:
        path: /ax-dev/templates

sandbox:
  runtimeClass: ""
  tiers:
    light:
      minReady: 2
      maxReady: 5
      template:
        command: ["node", "/opt/ax/dist/agent/runner.js"]
        cpu: "500m"
        memory: "512Mi"
        workspaceRoot: "/workspace"
        extraVolumeMounts:
          - name: ax-dev-dist
            mountPath: /opt/ax/dist
          - name: ax-dev-templates
            mountPath: /opt/ax/templates
          - name: ax-dev-skills
            mountPath: /opt/ax/skills
        extraVolumes:
          - name: ax-dev-dist
            hostPath:
              path: /ax-dev/dist
          - name: ax-dev-templates
            hostPath:
              path: /ax-dev/templates
          - name: ax-dev-skills
            hostPath:
              path: /ax-dev/skills
    heavy:
      minReady: 0
      maxReady: 1
      template:
        command: ["node", "/opt/ax/dist/agent/runner.js"]
        cpu: "1"
        memory: "2Gi"
        workspaceRoot: "/workspace"
        nodeSelector: {}
        extraVolumeMounts:
          - name: ax-dev-dist
            mountPath: /opt/ax/dist
          - name: ax-dev-templates
            mountPath: /opt/ax/templates
          - name: ax-dev-skills
            mountPath: /opt/ax/skills
        extraVolumes:
          - name: ax-dev-dist
            hostPath:
              path: /ax-dev/dist
          - name: ax-dev-templates
            hostPath:
              path: /ax-dev/templates
          - name: ax-dev-skills
            hostPath:
              path: /ax-dev/skills

postgresql:
  external:
    enabled: true
    existingSecret: ax-db-credentials
    secretKey: url
  internal:
    enabled: true
  auth:
    database: ax
    username: ax
    password: "ax-dev-password"
    existingSecret: ""
  image:
    tag: "17"

networkPolicies:
  enabled: false

apiCredentials:
  existingSecret: "ax-api-credentials"
  envVars:
    OPENROUTER_API_KEY: "openrouter-api-key"
    DEEPINFRA_API_KEY: "deepinfra-api-key"

webProxy:
  enabled: true
  port: 3128

config:
  profile: balanced
  web_proxy: true
  models:
    default:
      - openrouter/google/gemini-3-flash-preview
  providers:
    storage: database
    database: postgresql
    eventbus: postgres
    sandbox: k8s
