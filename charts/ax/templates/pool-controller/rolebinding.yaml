{{- if .Values.poolController.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ax.fullname" . }}-pool-controller-binding
  namespace: {{ include "ax.namespace" . }}
  labels:
    {{- include "ax.componentLabels" (dict "component" "pool-controller" "context" $) | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ax.fullname" . }}-pool-controller
    namespace: {{ include "ax.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "ax.fullname" . }}-pool-manager
  apiGroup: rbac.authorization.k8s.io
{{- end }}
