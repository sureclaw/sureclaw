apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ax.fullname" . }}-sandbox-templates
  namespace: {{ include "ax.namespace" . }}
  labels:
    {{- include "ax.componentLabels" (dict "component" "pool-controller" "context" $) | nindent 4 }}
data:
  {{- $sandboxImage := include "ax.image" (dict "image" .Values.sandbox.image "global" .Values.global "context" $) }}
  {{- $natsUrl := include "ax.natsUrl" . }}
  {{- range $tierName, $tier := .Values.sandbox.tiers }}
  {{ $tierName }}.json: |
    {
      "tier": {{ $tierName | quote }},
      "minReady": {{ $tier.minReady }},
      "maxReady": {{ $tier.maxReady }},
      "template": {
        "image": {{ $sandboxImage | quote }},
        "command": {{ $tier.template.command | toJson }},
        "cpu": {{ $tier.template.cpu | quote }},
        "memory": {{ $tier.template.memory | quote }},
        "tier": {{ $tierName | quote }},
        "natsUrl": {{ $natsUrl | quote }},
        "workspaceRoot": {{ $tier.template.workspaceRoot | quote }}
        {{- if $tier.template.nodeSelector }},
        "nodeSelector": {{ $tier.template.nodeSelector | toJson }}
        {{- end }}
      }
    }
  {{- end }}
