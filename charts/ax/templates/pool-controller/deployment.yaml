{{- if .Values.poolController.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ax.fullname" . }}-pool-controller
  namespace: {{ include "ax.namespace" . }}
  labels:
    {{- include "ax.componentLabels" (dict "component" "pool-controller" "context" $) | nindent 4 }}
spec:
  replicas: {{ .Values.poolController.replicas }}
  selector:
    matchLabels:
      {{- include "ax.selectorLabels" (dict "component" "pool-controller" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ax.selectorLabels" (dict "component" "pool-controller" "context" $) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-ax-config.yaml") . | sha256sum }}
        checksum/sandbox-templates: {{ include (print $.Template.BasePath "/pool-controller/configmap-sandbox-templates.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "ax.fullname" . }}-pool-controller
      containers:
        - name: controller
          image: {{ include "ax.image" (dict "image" .Values.poolController.image "global" .Values.global "context" $) }}
          command: {{ .Values.poolController.command | toJson }}
          ports:
            - name: metrics
              containerPort: {{ .Values.poolController.ports.metrics }}
              protocol: TCP
          env:
            - name: AX_CONFIG_PATH
              value: "/etc/ax/ax.yaml"
            - name: K8S_NAMESPACE
              value: {{ include "ax.namespace" . | quote }}
            - name: RECONCILE_INTERVAL_MS
              value: {{ .Values.poolController.reconcileIntervalMs | quote }}
            - name: SANDBOX_TEMPLATE_DIR
              value: "/etc/ax/sandbox-templates"
            - name: K8S_POD_IMAGE
              value: {{ include "ax.image" (dict "image" .Values.sandbox.image "global" .Values.global "context" $) | quote }}
            - name: NATS_URL
              value: {{ include "ax.natsUrl" . | quote }}
            {{- with .Values.poolController.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.poolController.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.poolController.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: ax-config
              mountPath: /etc/ax
              readOnly: true
            - name: sandbox-templates
              mountPath: /etc/ax/sandbox-templates
              readOnly: true
      volumes:
        - name: ax-config
          configMap:
            name: {{ include "ax.fullname" . }}-config
        - name: sandbox-templates
          configMap:
            name: {{ include "ax.fullname" . }}-sandbox-templates
{{- end }}
