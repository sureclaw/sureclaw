{{- /*
  AX hook secret — shared HMAC secret between the post-receive hook in the
  git-server container and the reconcile endpoint on the host. Without this,
  the hook silently no-ops (see container/git-server/install-hook.js: `if
  [ -z "${AX_HOOK_SECRET:-}" ]; then exit 0; fi`) and pushes never trigger
  skill reconciliation, so the admin dashboard never shows drafted skills.

  We generate a random 64-char value on first install and keep it stable
  across upgrades via `lookup`. resource-policy:keep means `helm uninstall`
  leaves it behind, so a reinstall picks up the same secret and the already-
  installed per-agent hook scripts keep working.
*/}}
{{- $name := printf "%s-hook" (include "ax.fullname" .) }}
{{- $existing := lookup "v1" "Secret" (include "ax.namespace" .) $name }}
{{- $value := "" }}
{{- if and $existing $existing.data $existing.data.secret }}
  {{- $value = $existing.data.secret }}
{{- else }}
  {{- $value = randAlphaNum 64 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ include "ax.namespace" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "ax.labels" . | nindent 4 }}
type: Opaque
data:
  secret: {{ $value }}
