apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ax.fullname" . }}-host-sandbox
  namespace: {{ include "ax.namespace" . }}
  labels:
    {{- include "ax.componentLabels" (dict "component" "host" "context" $) | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ax.fullname" . }}-host
    namespace: {{ include "ax.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "ax.fullname" . }}-sandbox-manager
  apiGroup: rbac.authorization.k8s.io
