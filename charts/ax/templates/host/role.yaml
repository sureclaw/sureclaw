apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ax.fullname" . }}-sandbox-manager
  namespace: {{ include "ax.namespace" . }}
  labels:
    {{- include "ax.componentLabels" (dict "component" "host" "context" $) | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/attach", "pods/exec"]
    verbs: ["create", "get"]
