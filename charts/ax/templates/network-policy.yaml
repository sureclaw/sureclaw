{{- if and .Values.webProxy.enabled .Values.networkPolicies.enabled }}
# Sandbox pod egress: web proxy and HTTP IPC on host pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ax-sandbox-egress
  labels:
    app.kubernetes.io/name: ax-network-policy
    app.kubernetes.io/component: sandbox
spec:
  podSelector:
    matchLabels:
      ax.io/plane: execution
  policyTypes:
    - Egress
  egress:
    # Web proxy + HTTP IPC on host pods
    - to:
        - podSelector:
            matchLabels:
              ax.io/plane: ingress
      ports:
        - port: {{ .Values.webProxy.port }}
          protocol: TCP
        - port: 8080
          protocol: TCP
    # Git server (workspace persistence via HTTP API)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ax-git
      ports:
        - port: {{ .Values.gitServer.httpPort }}
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
