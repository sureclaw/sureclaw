{{- if and .Values.webProxy.enabled .Values.networkPolicies.enabled }}
# Sandbox pod egress: web proxy, HTTP IPC, and NATS on the host/NATS pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ax-sandbox-egress
  labels:
    app.kubernetes.io/name: ax-network-policy
    app.kubernetes.io/component: sandbox
spec:
  podSelector:
    matchLabels:
      ax.io/plane: execution
  policyTypes:
    - Egress
  egress:
    # Web proxy + HTTP IPC on host pods
    - to:
        - podSelector:
            matchLabels:
              ax.io/plane: ingress
      ports:
        - port: {{ .Values.webProxy.port }}
          protocol: TCP
        - port: 8080
          protocol: TCP
    # NATS
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - port: 4222
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
