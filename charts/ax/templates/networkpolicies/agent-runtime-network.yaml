{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ax.fullname" . }}-agent-runtime-network
  namespace: {{ include "ax.namespace" . }}
  labels:
    {{- include "ax.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      ax.io/plane: conversation
  policyTypes:
    - Egress
  egress:
    # PostgreSQL (any provider — Cloud SQL, RDS, self-hosted, in-cluster)
    - ports:
        - port: 5432
          protocol: TCP
    # Kubernetes API (for sandbox pod CRUD — port 6443 is the actual
    # apiserver port; ClusterIP service DNAT from 443→6443 is not
    # matched by port-443 rules with Calico CNI)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
