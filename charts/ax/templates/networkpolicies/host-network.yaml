{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ax.fullname" . }}-host-network
  namespace: {{ include "ax.namespace" . }}
  labels:
    {{- include "ax.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      ax.io/plane: ingress
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound HTTP from any source (LoadBalancer)
    - ports:
        - port: {{ .Values.host.ports.http }}
          protocol: TCP
    {{- if $.Values.webProxy.enabled }}
    # Allow sandbox pods to reach the web proxy
    - from:
        - podSelector:
            matchLabels:
              ax.io/plane: execution
      ports:
        - port: {{ $.Values.webProxy.port }}
          protocol: TCP
    {{- end }}
  egress:
    # PostgreSQL (any provider — Cloud SQL, RDS, self-hosted, in-cluster)
    - ports:
        - port: 5432
          protocol: TCP
    # Git server (workspace persistence via HTTP API)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ax-git
      ports:
        - port: 8000
          protocol: TCP
    # External HTTPS (channels: Slack, Discord, etc.)
    - ports:
        - port: 443
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
