{{- if .Values.nats.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ax.fullname" . }}-nats-stream-init
  namespace: {{ include "ax.namespace" . }}
  labels:
    {{- include "ax.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "ax.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: natsio/nats-box:latest
          command: ["/bin/sh", "-c"]
          env:
            - name: NATS_USER
              value: "host"
            - name: NATS_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "ax.fullname" . }}-nats-auth
                  key: host-password
                  optional: true
          args:
            - |
              set -e
              NATS_URL={{ include "ax.natsUrl" . | quote }}
              NATS_USER=${NATS_USER:-}
              NATS_PASS=${NATS_PASS:-}
              NATS_AUTH=""
              if [ -n "$NATS_USER" ]; then
                NATS_AUTH="--user=$NATS_USER --password=$NATS_PASS"
              fi
              REPLICAS={{ include "ax.natsReplicas" . }}

              # Wait for NATS to be ready (use stream ls as connectivity check)
              until nats --server=$NATS_URL $NATS_AUTH stream ls 2>/dev/null; do
                echo "Waiting for NATS..."
                sleep 2
              done

              # Sandbox task dispatch stream
              nats --server=$NATS_URL $NATS_AUTH stream add TASKS \
                --subjects="tasks.sandbox.*" \
                --retention=work \
                --max-age=10m \
                --max-msgs=10000 \
                --discard=old \
                --storage=memory \
                --replicas=$REPLICAS \
                --defaults || true

              # Event streaming (EventBus over NATS)
              nats --server=$NATS_URL $NATS_AUTH stream add EVENTS \
                --subjects="events.>" \
                --retention=limits \
                --max-age=5m \
                --max-msgs=100000 \
                --discard=old \
                --storage=memory \
                --replicas=$REPLICAS \
                --defaults || true

              echo "All streams created successfully"
{{- end }}
