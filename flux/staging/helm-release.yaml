apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ax-staging
  namespace: ax-staging
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/ax
      sourceRef:
        kind: GitRepository
        name: ax
        namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  values:
    namespace:
      name: ax-staging

    config:
      profile: balanced
      providers:
        memory: cortex
        security: patterns
        channels: []
        web:
          extract: none
          search: none
        browser: none
        credentials: env
        storage: database
        database: postgresql
        eventbus: postgres
        sandbox: k8s
        audit: database
        history: sqlite
        scheduler: sqlite
        image: none

    host:
      replicas: 1
      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      autoscaling:
        enabled: false

    agentRuntime:
      replicas: 2
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "1"
          memory: "2Gi"
      autoscaling:
        enabled: false

    # sandbox worker tiers removed — agents execute tools locally

    networkPolicies:
      enabled: true
