apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ax-production
  namespace: ax
spec:
  interval: 10m
  chart:
    spec:
      chart: ./charts/ax
      sourceRef:
        kind: GitRepository
        name: ax
        namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  values:
    namespace:
      name: ax

    config:
      profile: paranoid
      providers:
        memory: cortex
        security: patterns
        channels: []
        web:
          extract: none
          search: none
        browser: none
        credentials: env
        storage: database
        database: postgresql
        eventbus: postgres
        sandbox: k8s
        audit: database
        history: sqlite
        scheduler: sqlite
        image: none
      sandbox:
        timeout_sec: 120
        memory_mb: 512
      admin:
        enabled: true
        port: 8080

    host:
      replicas: 2
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
      ingress:
        enabled: true
        className: ""
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        host: "ax.example.com"
        tls:
          - secretName: ax-tls
            hosts:
              - "ax.example.com"
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70

    agentRuntime:
      replicas: 3
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
      autoscaling:
        enabled: true
        minReplicas: 3
        maxReplicas: 20
        targetCPUUtilizationPercentage: 60

    # sandbox worker tiers removed — agents execute tools locally

    networkPolicies:
      enabled: true
