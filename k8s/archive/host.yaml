# AX Host Pods — Stateless HTTP ingress layer.
#
# These pods handle HTTP requests, SSE streaming, webhooks, admin dashboard,
# and channel connections (Slack, Discord). They do NOT run agent conversation
# loops or make LLM calls — those happen in agent-runtime pods.
#
# Session requests are published to NATS; results stream back via NATS EventBus.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ax-host
  namespace: ax
  labels:
    app.kubernetes.io/name: ax-host
    app.kubernetes.io/component: ingress
    ax.io/plane: ingress
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ax-host
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ax-host
        app.kubernetes.io/component: ingress
        ax.io/plane: ingress
    spec:
      containers:
        - name: host
          image: ax/host:latest
          command: ["node", "dist/host/server-k8s.js"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: NATS_URL
              value: "nats://nats.ax.svc.cluster.local:4222"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ax-db-credentials
                  key: url
            - name: AX_PROVIDERS_STORAGE
              value: "postgresql"
            - name: AX_PROVIDERS_EVENTBUS
              value: "nats"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      terminationGracePeriodSeconds: 30

---

apiVersion: v1
kind: Service
metadata:
  name: ax-host
  namespace: ax
  labels:
    app.kubernetes.io/name: ax-host
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ax-host
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---

# Ingress — expose the host service externally.
# Adjust annotations for your ingress controller (GKE default, nginx, etc.).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ax-ingress
  namespace: ax
  annotations:
    # GKE-managed certificate (replace with your domain)
    # networking.gke.io/managed-certificates: ax-cert
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - host: "ax.example.com"  # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ax-host
                port:
                  name: http
