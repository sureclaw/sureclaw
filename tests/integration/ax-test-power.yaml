# Power user profile test config
# Uses Phase 2 providers: guardian scanner, search web, cortex memory
# LLM is still mock for testing (no API key needed)
profile: yolo
models:
  default:
    - mock/default
providers:
  memory: cortex
  security: patterns
  channels: []
  web:
    extract: none
    search: none
  credentials: env
  skills: database
  audit: database
  sandbox: docker
  scheduler: none
sandbox:
  timeout_sec: 60
  memory_mb: 512
scheduler:
  active_hours: { start: "00:00", end: "23:59", timezone: "UTC" }
  max_token_budget: 8192
  heartbeat_interval_min: 15
