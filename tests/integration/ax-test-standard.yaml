# Balanced profile test config
# Uses Phase 1 providers: patterns scanner, file audit, cron scheduler
# LLM is still mock for testing (no API key needed)
profile: balanced
models:
  default:
    - mock/default
providers:
  memory: cortex
  security: patterns
  channels: []
  web:
    extract: none
    search: none
  credentials: env
  skills: database
  audit: database
  sandbox: docker
  scheduler: none
sandbox:
  timeout_sec: 30
  memory_mb: 256
scheduler:
  active_hours: { start: "00:00", end: "23:59", timezone: "UTC" }
  max_token_budget: 4096
  heartbeat_interval_min: 30
