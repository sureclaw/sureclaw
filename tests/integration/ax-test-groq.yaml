agent_name: test-agent
profile: paranoid
agent: pi-coding-agent
models:
  default:
    - groq/test-model
providers:
  memory: cortex
  security: patterns
  channels: []
  web:
    extract: none
    search: none
  credentials: database
  audit: database
  sandbox: docker
  scheduler: none
sandbox:
  timeout_sec: 30
  memory_mb: 256
scheduler:
  active_hours: { start: "00:00", end: "23:59", timezone: "UTC" }
  max_token_budget: 4096
  heartbeat_interval_min: 30
