# Kind cluster overrides for feature-level acceptance tests
#
# Uses the phase-2 architecture: host publishes session requests to
# NATS, agent-runtime subscribes and runs agents as subprocesses
# within its own pod. Pool controller is disabled — sandbox pods
# are not needed when agent-runtime uses subprocess sandbox.

# ─── AX Config overrides ─────────────────────────────────────────
# Must match tests/acceptance/fixtures/ax-k8s.yaml — the chart renders
# this block as ax.yaml inside the ConfigMap.
config:
  agent: pi-coding-agent
  profile: yolo
  models:
    default:
      - openrouter/google/gemini-3-flash-preview
  providers:
    memory: memoryfs
    audit: database
    credentials: plaintext
    sandbox: subprocess
    screener: static
    scheduler: plainjob
    browser: none
    skills: git
    channels: []
    web: none
    scanner: patterns
    storage: database
    database: postgresql
    eventbus: nats
  history:
    max_turns: 50
    thread_context_turns: 5
    summarize: false
    summarize_threshold: 40
    summarize_keep_recent: 10
    memory_recall: true
    memory_recall_limit: 5
    memory_recall_scope: "*"
    embedding_model: deepinfra/Qwen/Qwen3-Embedding-0.6B
    embedding_dimensions: 1024
  sandbox:
    timeout_sec: 120
    memory_mb: 512
  scheduler:
    active_hours:
      start: "07:00"
      end: "23:00"
      timezone: America/New_York
    max_token_budget: 4096
    heartbeat_interval_min: 30
  webhooks:
    enabled: true
    token: "acceptance-test-webhook-token-32charsx"

namespace:
  create: false
  name: ax-acceptance

host:
  replicas: 1
  image:
    repository: ax/host
    tag: test
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "1", memory: "2Gi" }

# Agent-runtime subscribes to NATS and runs agents as subprocesses.
# Pool controller disabled — no sandbox pods needed for acceptance tests.
agentRuntime:
  enabled: true
poolController:
  enabled: false

sandbox:
  runtimeClass: ""   # no gVisor on kind

# Deploy PostgreSQL in-cluster via Bitnami subchart.
# The chart auto-generates a secret with the DATABASE_URL.
postgresql:
  external:
    enabled: false
  internal:
    enabled: true
    auth:
      database: ax
      username: ax
    primary:
      persistence:
        size: 1Gi

nats:
  enabled: true
  config:
    cluster:
      enabled: false
    jetstream:
      enabled: true
      memoryStore:
        enabled: true
        maxSize: 256Mi

networkPolicies:
  enabled: false   # simpler for feature tests

apiCredentials:
  existingSecret: "ax-api-credentials"
  envVars:
    OPENROUTER_API_KEY: "openrouter-api-key"
    DEEPINFRA_API_KEY: "deepinfra-api-key"
