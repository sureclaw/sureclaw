# Acceptance test configuration
#
# This config is copied into the isolated AX_HOME for each test run.
# Edit these values to control which models/providers the tests use.
#
# Credentials live in .env.test at the project root (gitignored).
# Copy tests/acceptance/fixtures/.env.test.example to .env.test and
# fill in your API keys.

agent: pi-coding-agent
profile: yolo

# ── Models ──────────────────────────────────────────────────
# Change these to use cheaper/faster models for test runs.
models:
  default:
    - openrouter/google/gemini-3-flash-preview

# ── Providers ───────────────────────────────────────────────
# Local environment providers — compare with ax-k8s.yaml for k8s differences.
providers:
  memory: memoryfs
  audit: sqlite
  credentials: plaintext
  sandbox: seatbelt
  screener: static
  scheduler: plainjob
  browser: none
  skills: git
  channels: []
  web: none
  scanner: patterns
  storage: sqlite
  eventbus: inprocess

# ── History / Memory / Embeddings ───────────────────────────
history:
  max_turns: 50
  thread_context_turns: 5
  summarize: false
  summarize_threshold: 40
  summarize_keep_recent: 10
  memory_recall: true
  memory_recall_limit: 5
  memory_recall_scope: "*"
  embedding_model: deepinfra/Qwen/Qwen3-Embedding-0.6B
  embedding_dimensions: 1024

# ── Sandbox ─────────────────────────────────────────────────
sandbox:
  timeout_sec: 120
  memory_mb: 512

# ── Scheduler ────────────────────────────────────────────────
scheduler:
  active_hours:
    start: "07:00"
    end: "23:00"
    timezone: America/New_York
  max_token_budget: 4096
  heartbeat_interval_min: 30
