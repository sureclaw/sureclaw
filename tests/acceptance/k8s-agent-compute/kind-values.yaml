# Kind cluster test overrides — smaller resource footprint
namespace:
  create: false
  name: ax-test

host:
  replicas: 1
  image:
    repository: ax/host
    tag: test
  resources:
    requests: { cpu: "250m", memory: "256Mi" }
    limits: { cpu: "250m", memory: "256Mi" }

agentRuntime:
  replicas: 1
  image:
    repository: ax/host
    tag: test
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "500m", memory: "1Gi" }

poolController:
  replicas: 1
  image:
    repository: ax/host
    tag: test
  reconcileIntervalMs: 3000  # faster for testing

sandbox:
  image:
    repository: ax/agent
    tag: test
  runtimeClass: ""  # gVisor not available on kind
  tiers:
    light:
      minReady: 1        # smaller warm pool
      maxReady: 3
      template:
        cpu: "500m"       # smaller for kind
        memory: "512Mi"
    heavy:
      minReady: 0
      maxReady: 1
      template:
        cpu: "1"
        memory: "2Gi"
        nodeSelector: {}  # remove GKE-specific selector

# Use pre-created secret for DATABASE_URL (AX needs a full connection string)
# Keep internal PostgreSQL enabled so the subchart deploys the database
postgresql:
  external:
    enabled: true
    existingSecret: ax-db-credentials
    secretKey: url
  internal:
    enabled: true
  # Bitnami subchart values (top-level under postgresql key)
  auth:
    database: ax
    username: ax
    password: "ax-test-password"
    existingSecret: ""
  image:
    tag: "17"

nats:
  enabled: true
  config:
    cluster:
      enabled: false     # single node for kind
      replicas: 1
    jetstream:
      enabled: true
      memoryStore:
        enabled: true
        maxSize: 256Mi
      fileStore:
        maxSize: 1Gi
        pvc:
          size: 2Gi

networkPolicies:
  enabled: true

# API credentials — uncomment the provider you're using.
# The secret must contain matching keys (see test-plan.md setup).
apiCredentials:
  existingSecret: "ax-api-credentials"
  envVars:
    OPENROUTER_API_KEY: "openrouter-api-key"
    # ANTHROPIC_API_KEY: "anthropic-api-key"
    # OPENAI_API_KEY: "openai-api-key"

config:
  models:
    default: ["openrouter/anthropic/claude-sonnet-4"]
  providers:
    storage: postgresql
    eventbus: nats
    sandbox: k8s
